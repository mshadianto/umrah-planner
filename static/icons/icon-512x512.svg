<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2D2D2D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#C9A86C"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  
  <!-- Gold border -->
  <rect x="15" y="15" width="482" height="482" rx="80" fill="none" stroke="url(#gold)" stroke-width="6"/>
  
  <!-- Kaaba simplified icon -->
  <rect x="170" y="180" width="172" height="172" fill="url(#gold)" rx="15"/>
  <rect x="195" y="205" width="122" height="122" fill="#1A1A1A" rx="10"/>
  <rect x="220" y="230" width="72" height="72" fill="url(#gold)" rx="5"/>
  
  <!-- "L" letter for LABBAIK -->
  <text x="256" y="285" font-family="Arial, Helvetica, sans-serif" font-size="55" font-weight="bold" fill="#1A1A1A" text-anchor="middle" dominant-baseline="middle">L</text>
  
  <!-- Crescent moon -->
  <circle cx="256" cy="100" r="40" fill="url(#gold)"/>
  <circle cx="275" cy="90" r="32" fill="#1A1A1A"/>
  
  <!-- Star -->
  <polygon points="256,380 263,405 290,405 268,422 277,448 256,430 235,448 244,422 222,405 249,405" fill="url(#gold)"/>
  
  <!-- LABBAIK text at bottom -->
  <text x="256" y="480" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="8">LABBAIK</text>
</svg>
