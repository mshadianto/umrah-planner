# .streamlit/config.toml
# LABBAIK - Streamlit Configuration

[server]
# Enable serving static files from /static folder
enableStaticServing = true

# Server settings
headless = true
runOnSave = true
fileWatcherType = "auto"

[browser]
# Don't auto-open browser
gatherUsageStats = false

[theme]
# LABBAIK Dark Theme with Gold Accents
primaryColor = "#D4AF37"
backgroundColor = "#1A1A1A"
secondaryBackgroundColor = "#2D2D2D"
textColor = "#FFFFFF"
font = "sans serif"

[client]
# Toolbar mode
toolbarMode = "minimal"
showErrorDetails = false
